name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prisma generate
        run: pnpm --filter @reset/api exec prisma generate
        env:
          DATABASE_URL: postgresql://x:y@localhost:5432/x
          DIRECT_URL: postgresql://x:y@localhost:5432/x

      - name: Typecheck all workspaces
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://x:y@localhost:5432/x
          DIRECT_URL: postgresql://x:y@localhost:5432/x
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          CORS_ORIGIN: http://localhost:3000
        continue-on-error: true  # tests d'intégration nécessitent une DB live

      - name: Format check
        run: pnpm format:check
        continue-on-error: true
