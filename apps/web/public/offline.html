<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E0FBA" />
    <title>Hors ligne — Reset Egypt</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, sans-serif;
        background: linear-gradient(135deg, #1E0FBA 0%, #0E008E 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
      }
      .icon {
        width: 80px; height: 80px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        backdrop-filter: blur(8px);
      }
      .icon svg { width: 40px; height: 40px; stroke: white; stroke-width: 2; fill: none; }
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }
      p {
        font-size: 16px;
        opacity: 0.85;
        max-width: 380px;
        line-height: 1.55;
        margin-bottom: 32px;
      }
      .actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
      button {
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        padding: 14px 24px;
        border-radius: 12px;
        border: 0;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary {
        background: white;
        color: #1E0FBA;
      }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25); }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.12);
        color: white;
        backdrop-filter: blur(8px);
      }
      .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
      footer {
        margin-top: 48px;
        font-size: 13px;
        opacity: 0.5;
      }
      @media (prefers-reduced-motion: no-preference) {
        .icon { animation: pulse 2.4s ease-in-out infinite; }
        @keyframes pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.05); opacity: 0.85; }
        }
      }
    </style>
  </head>
  <body>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>Mode hors ligne</h1>
    <p>
      Pas de connexion internet pour le moment. Vos données chargées récemment restent
      accessibles. Réessaie quand le réseau revient.
    </p>
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">Réessayer</button>
      <button class="btn-secondary" onclick="history.back()">Retour</button>
    </div>
    <footer>Reset Egypt · Branch Cairo East CMC</footer>
    <script>
      // Auto-retry quand le réseau revient
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
