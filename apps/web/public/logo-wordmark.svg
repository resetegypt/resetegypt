<?xml version="1.0" encoding="UTF-8"?>
<!-- Wordmark Reset — text continu "RESET" propre, point corail (#FF5440) en accent sur le E.
     Couleur des lettres = currentColor pour s'adapter au contexte (light/dark/RTL). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Reset">
  <text
    x="50%"
    y="148"
    text-anchor="middle"
    fill="currentColor"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif"
    font-weight="800"
    font-size="170"
    letter-spacing="-4"
  >RESET</text>
  <!-- Point corail signature de la marque, posé au-dessus du "E" final (titre stylisé) -->
  <circle cx="538" cy="38" r="16" fill="#FF5440"/>
</svg>
